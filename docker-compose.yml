version: '3.9'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - autoanalyst

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    networks:
      - autoanalyst

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/app/uploads
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_URL=http://ollama:11434/api/generate
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - autoanalyst

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A celery_app.celery worker --loglevel=info
    volumes:
      - uploads_data:/app/uploads
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_URL=http://ollama:11434/api/generate
    depends_on:
      - redis
      - backend
    restart: unless-stopped
    networks:
      - autoanalyst

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - autoanalyst

volumes:
  uploads_data:
  ollama_data:

networks:
  autoanalyst:
    driver: bridge
